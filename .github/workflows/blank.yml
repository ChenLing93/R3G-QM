name: Build ImmortalWrt for Xiaomi R3G

on:
  workflow_dispatch: # 允许手动点击运行
  push:
    tags:
      - 'v*' # 当推送 v 开头的标签（如 v1.0, v24.10.1）时自动触发

jobs:
  build:
    runs-on: ubuntu-24.04 # 运行环境
    permissions:
      contents: write # 赋予写入权限，以便创建 Release 和上传文件

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt update -y
        sudo apt full-upgrade -y
        sudo apt install -y build-essential ccache cmake automake autoconf \
        bison flex gawk gettext git libncurses5-dev libncursesw5-dev \
        libssl-dev python3 python3-pyelftools zlib1g-dev \
        gcc-multilib g++-multilib pkgconf libtool lrzsz unzip wget rsync

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Clone ImmortalWrt Source
      run: |
        git clone -b openwrt-24.10 https://github.com/immortalwrt/immortalwrt.git
        cd immortalwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Add Aurora Theme & QModem
      run: |
        cd immortalwrt
        # 拉取 Aurora 主题
        git clone https://github.com/ChenLing93/luci-theme-aurora.git package/luci-theme-aurora
        # 拉取 QModem 5G 模组管理
        git clone https://github.com/FUjr/QModem.git package/QModem

    # --- 修改点：直接复制外置的 .config 文件 ---
    - name: Load Custom Configure
      run: |
        # 将仓库根目录下的 .config 复制到源码目录
        cp .config immortalwrt/.config
        cd immortalwrt
        make defconfig
    # -----------------------------------------

    - name: Download Packages
      run: |
        cd immortalwrt
        make download -j$(nproc)

    - name: Compile Firmware
      run: |
        cd immortalwrt
        make -j$(nproc) V=s

    - name: Upload Firmware to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt-Xiaomi-R3G-SquashFS
        path: immortalwrt/bin/targets/ramips/mt7621/*.bin

    # 准备发布文件
    - name: Prepare Release Assets
      run: |
        mkdir -p release_assets
        cp immortalwrt/bin/targets/ramips/mt7621/*.bin release_assets/ || echo "No .bin files found in the specified directory."

    # 获取当前时间并创建 GitHub Release
    - name: Create GitHub Release
      id: get_time # 为这个步骤指定一个 ID，方便后续引用
      run: |
        # 获取北京时间（UTC+8），格式如：2026-07-20 10:58:58
        BUILD_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
        
        # 将时间写入 GitHub Actions 的输出变量中
        echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT

    # 使用获取到的时间创建 Release
    - name: Publish Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: release_assets/*.bin
        # 使用 ${{ steps.get_time.outputs.build_time }} 引用刚才生成的时间
        body: |
          🚀 自动编译的 ImmortalWrt 固件
          
          - **编译时间**：${{ steps.get_time.outputs.build_time }} (北京时间)
          - **设备型号**：小米 R3G
          - **源码分支**：openwrt-24.10
          - **文件系统**：SquashFS
          - **包含插件**：Aurora 主题, QModem 5G 模组管理, UPnP, WeChatPush
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

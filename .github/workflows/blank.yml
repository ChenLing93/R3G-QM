name: Build ImmortalWrt for Xiaomi R3G

on:
  workflow_dispatch: # 允许手动点击运行
  push:
    tags:
      - 'v*' # 当推送 v 开头的标签（如 v1.0, v24.10.1）时自动触发

jobs:
  build:
    runs-on: ubuntu-24.04 # 运行环境
    permissions:
      contents: write # 赋予写入权限，以便创建 Release 和上传文件

    steps:
    - name: 检出仓库代码 (Checkout Repository)
      uses: actions/checkout@v5

    - name: 安装系统依赖 (Install Dependencies)
      run: |
        sudo apt update -y
        sudo apt full-upgrade -y
        sudo apt install -y build-essential ccache cmake automake autoconf \
        bison flex gawk gettext git libncurses5-dev libncursesw5-dev \
        libssl-dev python3 python3-pyelftools zlib1g-dev \
        gcc-multilib g++-multilib pkgconf libtool lrzsz unzip wget rsync

    - name: 配置 Node.js 环境 (Setup Node.js)
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: 克隆 ImmortalWrt 源码 (Clone ImmortalWrt Source)
      run: |
        git clone -b openwrt-24.10 https://github.com/immortalwrt/immortalwrt.git
        cd immortalwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 添加 Aurora 主题与 QModem 插件 (Add Aurora Theme & QModem)
      run: |
        cd immortalwrt
        # 拉取 Aurora 主题
        git clone https://github.com/ChenLing93/luci-theme-aurora.git package/luci-theme-aurora
        # 拉取 QModem 5G 模组管理
        git clone https://github.com/FUjr/QModem.git package/QModem

    - name: 加载自定义配置文件 (Load Custom Configure)
      run: |
        # 将仓库根目录下的 .config 复制到源码目录
        cp .config immortalwrt/.config
        cd immortalwrt
        make defconfig

    - name: 下载依赖包 (Download Packages)
      run: |
        cd immortalwrt
        make download -j$(nproc)

    - name: 开始编译固件 (Compile Firmware)
      run: |
        cd immortalwrt
        make -j$(nproc) V=s

    - name: 上传固件至 Artifacts (Upload Firmware to Artifacts)
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt-Xiaomi-R3G-SquashFS
        path: immortalwrt/bin/targets/ramips/mt7621/*.bin

    - name: 准备发布文件 (Prepare Release Assets)
      run: |
        mkdir -p release_assets
        cp immortalwrt/bin/targets/ramips/mt7621/*.bin release_assets/ || echo "No .bin files found in the specified directory."

    - name: 获取当前编译时间 (Get Build Time)
      id: get_time
      run: |
        BUILD_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
        echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT

    - name: 发布至 GitHub Releases (Publish Release)
      uses: softprops/action-gh-release@v2
      # 修改条件：如果是打标签，或者是手动触发的，都执行发布操作
      if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
      with:
        files: release_assets/*.bin
        body: |
          🚀 自动编译的 ImmortalWrt 固件
          
          - **编译时间**：${{ steps.get_time.outputs.build_time }} (北京时间)
          - **设备型号**：小米 R3G
          - **源码分支**：openwrt-24.10
          - **文件系统**：SquashFS
          - **包含插件**：Aurora 主题, QModem 5G 模组管理, UPnP, WeChatPush
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

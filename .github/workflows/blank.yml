name: Build ImmortalWrt for Xiaomi R3G

on:
  workflow_dispatch: # 允许手动点击运行
  push:
    tags:
      - 'v*' # 当推送 v 开头的标签（如 v1.0, v24.10.1）时自动触发

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write # 赋予写入权限，以便创建 Release 和上传文件

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt update -y
        sudo apt full-upgrade -y
        sudo apt install -y build-essential ccache cmake automake autoconf \
        bison flex gawk gettext git libncurses5-dev libncursesw5-dev \
        libssl-dev python3 python3-pyelftools zlib1g-dev \
        gcc-multilib g++-multilib pkgconf libtool lrzsz unzip wget rsync

    - name: Clone ImmortalWrt Source
      run: |
        git clone -b openwrt-24.10 https://github.com/immortalwrt/immortalwrt.git
        cd immortalwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Add Aurora Theme & QModem
      run: |
        cd immortalwrt
        # 拉取 Aurora 主题 (使用 git:// 协议避免身份验证问题)
        git clone git://github.com/kenzok8/luci-theme-aurora.git package/luci-theme-aurora
        # 拉取 QModem 5G 模组管理
        git clone https://github.com/FUjr/QModem.git package/QModem

    - name: Custom Configure (.config)
      run: |
        cd immortalwrt
        cat >> .config <<EOF
        # 目标架构与设备
        CONFIG_TARGET_ramips=y
        CONFIG_TARGET_ramips_mt7621=y
        CONFIG_TARGET_ramips_mt7621_DEVICE_xiaomi_mi-router-3g=y
        
        # 强制指定使用 SquashFS 格式，排除 ext4
        CONFIG_TARGET_ROOTFS_SQUASHFS=y
        CONFIG_TARGET_ROOTFS_EXT4FS=n
        
        # 主题与插件配置
        CONFIG_PACKAGE_luci-theme-aurora=y
        CONFIG_PACKAGE_luci-app-qmodem=y
        CONFIG_PACKAGE_luci-i18n-qmodem-zh-cn=y
        CONFIG_PACKAGE_luci-app-upnp=y
        CONFIG_PACKAGE_luci-i18n-upnp-zh-cn=y
        EOF
        make defconfig

    - name: Download Packages
      run: |
        cd immortalwrt
        make download -j$(nproc)

    - name: Compile Firmware
      run: |
        cd immortalwrt
        make -j$(nproc) V=s

    - name: Upload Firmware to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt-Xiaomi-R3G-SquashFS
        path: immortalwrt/bin/targets/ramips/mt7621/*.bin

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/') # 仅在推送标签时执行发布
      with:
        files: |
          immortalwrt/bin/targets/ramips/mt7621/*.bin
        body: |
          自动编译的 ImmortalWrt 固件
          - 设备：小米 R3G
          - 分支：openwrt-24.10
          - 文件系统：SquashFS
          - 包含插件：Aurora 主题, QModem 5G 模组管理, UPnP
        generate_release_notes: true # 自动生成版本更新说明
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
